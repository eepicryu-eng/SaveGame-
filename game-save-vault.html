<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameSave — خزنة حفظ الألعاب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:      #020c18;
    --bg-card:      #071525;
    --bg-surface:   #0c1f35;
    --bg-raised:    #132840;
    --navy-dark:    #0a1628;
    --blue-primary: #1565c0;
    --blue-bright:  #1e88e5;
    --blue-light:   #42a5f5;
    --blue-glow:    #64b5f6;
    --steel:        #5b8fa8;
    --crimson:      #9b0018;
    --red:          #c8102e;
    --cream:        #e8f4fd;
    --gold:         #c8a951;
    --accent-green: #1db87a;
    --text-primary: #e3f2fd;
    --text-secondary: #7bafd4;
    --text-muted:   #2d5470;
    --border:       #0d2a45;
    --border-bright:#163d5e;
    --glow-blue:    0 0 28px rgba(30,136,229,0.35);
    --glow-blue-sm: 0 0 16px rgba(30,136,229,0.25);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg-texture {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 10% 20%, rgba(21,101,192,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 90% 80%, rgba(30,136,229,0.09) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(13,51,73,0.15) 0%, transparent 70%);
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(30,136,229,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,136,229,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--blue-primary); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--blue-bright); }

  /* ════════════════════════
     LOGIN SCREEN
  ════════════════════════ */
  #login-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-deep);
  }
  .login-container {
    width: 440px;
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    border-radius: 22px;
    padding: 50px 44px;
    position: relative; overflow: hidden;
    animation: slideUp 0.65s cubic-bezier(0.22,1,0.36,1);
    box-shadow: var(--glow-blue), 0 40px 80px rgba(0,0,0,0.7);
  }
  .login-container::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--blue-primary), var(--blue-bright), var(--blue-glow), var(--blue-bright), var(--blue-primary));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }
  .login-bg-circle {
    position: absolute; width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(30,136,229,0.06) 0%, transparent 70%);
    border-radius: 50%; bottom: -100px; left: -80px; pointer-events: none;
  }
  .login-logo {
    text-align: center; margin-bottom: 38px; position: relative;
  }
  .login-logo .logo-wrap {
    width: 88px; height: 88px; margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--blue-primary), var(--blue-bright));
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--glow-blue), 0 8px 24px rgba(21,101,192,0.4);
    padding: 16px;
  }
  .login-logo .logo-wrap img {
    width: 100%; height: 100%; object-fit: contain;
    filter: brightness(0) invert(1);
  }
  .login-logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px; font-weight: 900; letter-spacing: 1px;
    background: linear-gradient(135deg, var(--cream) 0%, var(--blue-glow) 50%, var(--cream) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .login-logo p { color: var(--text-secondary); font-size: 13px; margin-top: 5px; }

  .form-group { margin-bottom: 22px; }
  .form-group label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 8px; letter-spacing: 0.4px;
  }
  .form-group input {
    width: 100%; padding: 13px 16px;
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 11px; color: var(--cream);
    font-family: 'Tajawal', sans-serif; font-size: 15px;
    transition: all 0.2s; outline: none;
  }
  .form-group input:focus {
    border-color: var(--blue-bright);
    box-shadow: 0 0 0 3px rgba(30,136,229,0.15);
    background: var(--bg-raised);
  }
  .form-group input::placeholder { color: var(--text-muted); }

  .pin-group { display: flex; gap: 10px; }
  .pin-group input {
    flex: 1; text-align: center;
    font-size: 24px; font-weight: 700; padding: 12px 6px;
    letter-spacing: 2px;
  }

  .btn-login {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--blue-primary) 0%, var(--blue-bright) 100%);
    border: none; border-radius: 11px; color: white;
    font-family: 'Tajawal', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 6px;
    transition: all 0.25s; letter-spacing: 0.5px;
    box-shadow: 0 4px 18px rgba(30,136,229,0.4);
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(30,136,229,0.55);
    background: linear-gradient(135deg, var(--blue-bright) 0%, var(--blue-light) 100%);
  }
  .btn-login:active { transform: translateY(0); }

  .login-error {
    background: rgba(200,16,46,0.1); border: 1px solid rgba(200,16,46,0.3);
    color: #f4a0aa; border-radius: 8px; padding: 10px 14px;
    font-size: 13px; margin-top: 12px; display: none; text-align: center;
  }

  /* ════════════════════════
     MAIN APP
  ════════════════════════ */
  #main-app { display: none; position: relative; z-index: 1; min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(2,12,24,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-bright);
    padding: 0 36px;
    display: flex; align-items: center; justify-content: space-between;
    height: 66px;
  }
  .header-logo { display: flex; align-items: center; gap: 12px; }
  .header-logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--blue-primary), var(--blue-bright));
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    padding: 7px; box-shadow: var(--glow-blue-sm);
  }
  .header-logo-icon img {
    width: 100%; height: 100%; object-fit: contain;
    filter: brightness(0) invert(1);
  }
  .header-logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 19px; font-weight: 900; letter-spacing: 0.5px;
    background: linear-gradient(135deg, var(--cream), var(--blue-glow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-user {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-surface); border: 1px solid var(--border-bright);
    border-radius: 40px; padding: 5px 16px 5px 7px; cursor: pointer;
    transition: all 0.2s;
  }
  .header-user:hover { border-color: var(--blue-bright); box-shadow: var(--glow-blue-sm); }
  .user-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-primary), var(--blue-bright));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: white;
    box-shadow: 0 0 10px rgba(30,136,229,0.4);
  }
  .user-info .name { font-size: 14px; font-weight: 600; color: var(--cream); }
  .user-info .badge { font-size: 11px; color: var(--blue-light); letter-spacing: 1px; }
  .btn-logout {
    background: none; border: 1px solid var(--border-bright); border-radius: 8px;
    color: var(--text-secondary); padding: 7px 14px; cursor: pointer;
    font-family: 'Tajawal', sans-serif; font-size: 13px; transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* ── HERO ── */
  .hero {
    padding: 44px 36px 32px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .hero::after {
    content: ''; position: absolute; bottom: -1px; left: 36px; width: 160px; height: 2px;
    background: linear-gradient(90deg, var(--blue-bright), transparent);
  }
  .hero-text h2 {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 700; line-height: 1.3; color: var(--cream);
  }
  .hero-text h2 span {
    background: linear-gradient(135deg, var(--blue-bright), var(--blue-glow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero-text p { color: var(--text-secondary); margin-top: 6px; font-size: 15px; }
  .hero-stats { display: flex; gap: 14px; }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border-bright);
    border-radius: 14px; padding: 16px 24px; text-align: center;
    min-width: 106px; position: relative; overflow: hidden;
    transition: all 0.2s;
  }
  .stat-card:hover { border-color: var(--blue-bright); box-shadow: var(--glow-blue-sm); }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--blue-primary), var(--blue-bright), var(--blue-light));
  }
  .stat-card .val {
    font-family: 'Playfair Display', serif;
    font-size: 30px; font-weight: 900;
    background: linear-gradient(135deg, var(--blue-bright), var(--blue-glow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-card .lbl { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 22px 36px 18px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 200px;
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-card); border: 1px solid var(--border-bright);
    border-radius: 12px; padding: 10px 16px; transition: all 0.2s;
  }
  .search-box:focus-within {
    border-color: var(--blue-bright);
    box-shadow: 0 0 0 3px rgba(30,136,229,0.12);
  }
  .search-box input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--cream); font-family: 'Tajawal', sans-serif; font-size: 14px;
  }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-box .ico { color: var(--text-muted); font-size: 15px; }

  .btn-add {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--blue-primary), var(--blue-bright));
    border: none; border-radius: 12px; color: white;
    padding: 11px 20px; cursor: pointer;
    font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 700;
    transition: all 0.25s; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(30,136,229,0.35);
  }
  .btn-add:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 22px rgba(30,136,229,0.5);
    background: linear-gradient(135deg, var(--blue-bright), var(--blue-light));
  }

  .sort-btn {
    background: var(--bg-card); border: 1px solid var(--border-bright);
    border-radius: 10px; color: var(--text-secondary);
    padding: 10px 14px; cursor: pointer;
    font-family: 'Tajawal', sans-serif; font-size: 13px;
    transition: all 0.2s; white-space: nowrap;
  }
  .sort-btn:hover { color: var(--cream); border-color: var(--blue-primary); }
  .sort-btn.active {
    border-color: var(--blue-bright); color: var(--blue-bright);
    background: rgba(30,136,229,0.1);
  }

  /* ── SAVES GRID ── */
  .saves-grid {
    padding: 6px 36px 52px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(265px, 1fr));
    gap: 20px;
  }
  .save-card {
    background: var(--bg-card); border: 1px solid var(--border-bright);
    border-radius: 16px; overflow: hidden;
    transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
    position: relative; animation: fadeInCard 0.4s ease;
  }
  .save-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue-primary), transparent);
    opacity: 0; transition: opacity 0.25s;
  }
  .save-card:hover {
    border-color: var(--blue-bright);
    transform: translateY(-5px);
    box-shadow: var(--glow-blue), 0 24px 48px rgba(0,0,0,0.5);
  }
  .save-card:hover::before { opacity: 1; }
  .save-card-img {
    width: 100%; height: 155px;
    background: linear-gradient(135deg, var(--bg-surface), var(--navy-dark));
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .save-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .save-card-img .default-icon {
    font-size: 52px; opacity: 0.5;
    filter: drop-shadow(0 0 12px rgba(30,136,229,0.4));
  }
  .save-card-img .img-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 45%, rgba(2,12,24,0.88));
  }
  .file-badge {
    position: absolute; top: 10px; left: 10px;
    background: rgba(21,101,192,0.75); border: 1px solid rgba(30,136,229,0.5);
    color: var(--blue-glow); border-radius: 6px;
    padding: 3px 9px; font-size: 11px; font-weight: 700; letter-spacing: 1px;
    backdrop-filter: blur(6px);
  }
  .save-card-body { padding: 16px 16px 8px; }
  .save-card-name {
    font-size: 15px; font-weight: 700; margin-bottom: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--cream);
  }
  .save-card-meta {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--text-secondary);
  }
  .save-card-size {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 8px; font-size: 11px;
    color: var(--blue-light); letter-spacing: 0.5px;
  }
  .save-card-actions { display: flex; gap: 6px; padding: 10px 16px 16px; }
  .card-btn {
    flex: 1; padding: 8px; border-radius: 8px;
    border: 1px solid var(--border-bright);
    background: var(--bg-surface); color: var(--text-secondary);
    cursor: pointer; font-size: 13px; font-family: 'Tajawal', sans-serif;
    transition: all 0.2s; text-align: center;
  }
  .card-btn:hover { background: var(--bg-raised); color: var(--cream); }
  .card-btn.edit:hover { border-color: var(--blue-bright); color: var(--blue-bright); background: rgba(30,136,229,0.08); }
  .card-btn.download:hover { border-color: var(--accent-green); color: var(--accent-green); background: rgba(29,184,122,0.08); }
  .card-btn.danger:hover { border-color: var(--red); color: var(--red); background: rgba(200,16,46,0.08); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 90px 32px; grid-column: 1/-1;
  }
  .empty-state .empty-icon { font-size: 70px; display: block; margin-bottom: 20px; opacity: 0.25; }
  .empty-state h3 { font-size: 20px; color: var(--text-secondary); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; color: var(--text-muted); }

  /* ════════════════════════
     MODAL
  ════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(2,8,18,0.88); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border-bright);
    border-radius: 20px; width: 100%; max-width: 490px;
    max-height: 90vh; overflow-y: auto;
    transform: scale(0.92) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
    box-shadow: var(--glow-blue), 0 40px 80px rgba(0,0,0,0.7);
    position: relative;
  }
  .modal::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--blue-primary), var(--blue-bright), var(--blue-glow), var(--blue-bright), var(--blue-primary));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
    border-radius: 20px 20px 0 0;
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-header {
    padding: 26px 24px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg-card); z-index: 2;
  }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--cream); }
  .modal-close {
    background: var(--bg-surface); border: none; border-radius: 8px;
    color: var(--text-secondary); width: 32px; height: 32px;
    cursor: pointer; font-size: 16px; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: rgba(30,136,229,0.15); color: var(--blue-bright); }
  .modal-body { padding: 24px; }

  .field { margin-bottom: 20px; }
  .field label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 8px; letter-spacing: 0.3px;
  }
  .field input[type="text"] {
    width: 100%; padding: 12px 16px;
    background: var(--bg-surface); border: 1px solid var(--border-bright);
    border-radius: 10px; color: var(--cream);
    font-family: 'Tajawal', sans-serif; font-size: 14px;
    transition: all 0.2s; outline: none;
  }
  .field input[type="text"]:focus {
    border-color: var(--blue-bright);
    box-shadow: 0 0 0 3px rgba(30,136,229,0.12);
    background: var(--bg-raised);
  }
  .field input[type="text"]::placeholder { color: var(--text-muted); }

  .img-preview {
    width: 100%; height: 155px;
    background: var(--bg-surface); border: 2px dashed var(--border-bright);
    border-radius: 12px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; transition: all 0.2s; overflow: hidden; position: relative;
  }
  .img-preview:hover { border-color: var(--blue-bright); background: rgba(30,136,229,0.04); }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; }
  .img-preview .img-placeholder { color: var(--text-muted); font-size: 13px; text-align: center; }
  .img-preview .img-icon { font-size: 30px; margin-bottom: 4px; opacity: 0.4; }
  .img-preview .img-remove {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.75); border: none; border-radius: 6px;
    color: white; padding: 4px 8px; cursor: pointer; font-size: 12px; display: none;
  }
  .img-preview:hover .img-remove { display: block; }

  .file-upload-area {
    border: 2px dashed var(--border-bright); border-radius: 12px;
    padding: 26px; text-align: center; cursor: pointer;
    transition: all 0.2s; position: relative;
  }
  .file-upload-area:hover { border-color: var(--blue-bright); background: rgba(30,136,229,0.04); }
  .file-upload-area.has-file { border-color: var(--accent-green); background: rgba(29,184,122,0.05); }
  .file-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }
  .upload-text { font-size: 14px; color: var(--text-secondary); }
  .upload-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .file-name-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(29,184,122,0.12); border: 1px solid rgba(29,184,122,0.3);
    color: var(--accent-green); border-radius: 20px;
    padding: 4px 12px; font-size: 13px; margin-top: 8px;
  }
  .size-bar { margin-top: 10px; }
  .size-bar-track {
    background: var(--bg-surface); border-radius: 4px; height: 6px;
    overflow: hidden; margin-top: 6px; border: 1px solid var(--border);
  }
  .size-bar-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--blue-primary), var(--blue-bright));
    transition: width 0.3s;
  }
  .size-bar-fill.warn { background: linear-gradient(90deg, #f97316, var(--red)); }
  .size-label { font-size: 12px; color: var(--text-secondary); display: flex; justify-content: space-between; }

  .modal-footer {
    padding: 14px 24px 24px;
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .btn-cancel {
    background: var(--bg-surface); border: 1px solid var(--border-bright);
    border-radius: 10px; color: var(--text-secondary);
    padding: 11px 20px; cursor: pointer;
    font-family: 'Tajawal', sans-serif; font-size: 14px; transition: all 0.2s;
  }
  .btn-cancel:hover { color: var(--cream); border-color: var(--blue-primary); }
  .btn-save {
    background: linear-gradient(135deg, var(--blue-primary), var(--blue-bright));
    border: none; border-radius: 10px; color: white;
    padding: 11px 26px; cursor: pointer;
    font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 700;
    transition: all 0.2s; box-shadow: 0 4px 14px rgba(30,136,229,0.35);
  }
  .btn-save:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 22px rgba(30,136,229,0.5);
    background: linear-gradient(135deg, var(--blue-bright), var(--blue-light));
  }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .error-msg {
    background: rgba(200,16,46,0.1); border: 1px solid rgba(200,16,46,0.3);
    color: #f4a0aa; border-radius: 8px; padding: 10px 14px;
    font-size: 13px; margin-bottom: 16px; display: none;
  }

  /* ── TOAST ── */
  .toast-container {
    position: fixed; bottom: 24px; left: 24px; z-index: 300;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: var(--bg-raised); border: 1px solid var(--border-bright);
    border-radius: 12px; padding: 12px 20px;
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; min-width: 230px;
    animation: toastIn 0.3s cubic-bezier(0.22,1,0.36,1);
    box-shadow: var(--glow-blue-sm), 0 8px 24px rgba(0,0,0,0.5);
    color: var(--cream);
  }
  .toast.success .toast-dot { color: var(--accent-green); }
  .toast.error   .toast-dot { color: var(--red); }
  .toast.info    .toast-dot { color: var(--blue-bright); }

  /* ── SECTION DIVIDER ── */
  .divider {
    height: 1px; margin: 0 36px;
    background: linear-gradient(90deg, var(--blue-primary), transparent 70%);
    opacity: 0.3;
  }

  /* ── ANIMATIONS ── */
  @keyframes slideUp {
    from { opacity:0; transform:translateY(30px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeInCard {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes toastIn {
    from { opacity:0; transform:translateX(-20px); }
    to   { opacity:1; transform:translateX(0); }
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @media (max-width: 600px) {
    .header { padding: 0 16px; }
    .hero, .toolbar, .saves-grid { padding-right: 16px; padding-left: 16px; }
    .hero { flex-direction: column; }
    .hero-stats { width: 100%; justify-content: space-between; }
    .login-container { padding: 36px 24px; margin: 16px; width: auto; }
    .saves-grid { grid-template-columns: 1fr; }
    .header-logo-text { font-size: 15px; }
  }
</style>
</head>

<script>
/* ══════════════════════════════
   STATE
══════════════════════════════ */
let currentUser   = null;
let saves         = [];
let editingId     = null;
let selectedFileData  = null;
let selectedImageData = null;
let sortMode = 'date';
const MAX_SIZE = 50 * 1024 * 1024;

/* ══════════════════════════════
   LOGIN
══════════════════════════════ */
function handleLogin() {
  const username = document.getElementById('login-username').value.trim();
  const pins     = [...document.querySelectorAll('.pin-digit')].map(i => i.value.trim());
  const pin      = pins.join('');
  if (!username) { showLoginError('يرجى إدخال اسم المستخدم'); document.getElementById('login-username').focus(); return; }
  if (pin.length !== 4 || !/^\d{4}$/.test(pin)) { showLoginError('يرجى إدخال رمز دخول من 4 أرقام'); return; }
  document.getElementById('login-error').style.display = 'none';
  currentUser = { username, pin };
  loadUserSaves();
  bootApp();
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function bootApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('display-username').textContent = currentUser.username;
  document.getElementById('display-pin').textContent = 'PIN ' + '•'.repeat(4);
  document.getElementById('hero-username').textContent = currentUser.username;
  document.getElementById('avatar-initials').textContent = currentUser.username.slice(0,2).toUpperCase();
  renderSaves();
}

function handleLogout() {
  currentUser = null; saves = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-username').value = '';
  [...document.querySelectorAll('.pin-digit')].forEach(i => i.value = '');
}

/* ══════════════════════════════
   STORAGE (localStorage — مؤقت قبل Supabase)
══════════════════════════════ */
function storageKey() { return 'gsv_' + currentUser.username + '_' + currentUser.pin; }
function loadUserSaves() {
  try { const raw = localStorage.getItem(storageKey()); saves = raw ? JSON.parse(raw) : []; }
  catch { saves = []; }
}
function persistSaves() {
  try { localStorage.setItem(storageKey(), JSON.stringify(saves)); }
  catch { showToast('error', '⚠️ تعذر الحفظ — الذاكرة ممتلئة'); }
}

/* ══════════════════════════════
   RENDER
══════════════════════════════ */
function renderSaves() {
  const grid  = document.getElementById('saves-grid');
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  let data = [...saves];
  if (query) data = data.filter(s => s.name.toLowerCase().includes(query));
  if (sortMode === 'name')      data.sort((a,b) => a.name.localeCompare(b.name,'ar'));
  else if (sortMode === 'size') data.sort((a,b) => b.fileSize - a.fileSize);
  else                          data.sort((a,b) => b.createdAt - a.createdAt);

  const total = saves.reduce((acc,s) => acc + (s.fileSize||0), 0);
  document.getElementById('stat-count').textContent = saves.length;
  document.getElementById('stat-size').textContent  = formatSize(total);

  if (data.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <span class="empty-icon">🗂️</span>
      <h3>${query ? 'لا توجد نتائج' : 'لا توجد ملفات بعد'}</h3>
      <p>${query ? 'جرّب كلمة بحث أخرى' : 'اضغط على ＋ إضافة ملف حفظ للبدء'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = data.map(s => `
    <div class="save-card">
      <div class="save-card-img">
        ${s.image
          ? `<img src="${s.image}" loading="lazy"><div class="img-overlay"></div>`
          : `<span class="default-icon">🎮</span>`
        }
        <span class="file-badge">${getExt(s.fileName)}</span>
      </div>
      <div class="save-card-body">
        <div class="save-card-name" title="${s.name}">${s.name}</div>
        <div class="save-card-meta">
          <span>${formatDate(s.createdAt)}</span>
          <span class="save-card-size">${formatSize(s.fileSize)}</span>
        </div>
      </div>
      <div class="save-card-actions">
        <button class="card-btn edit"     onclick="openEditModal('${s.id}')">✏️ تعديل</button>
        <button class="card-btn download" onclick="downloadSave('${s.id}')">⬇️ تحميل</button>
        <button class="card-btn danger"   onclick="deleteSave('${s.id}')">🗑️</button>
      </div>
    </div>`).join('');
}

function filterSaves() { renderSaves(); }
function sortSaves(mode) {
  sortMode = mode;
  ['date','name','size'].forEach(m =>
    document.getElementById('sort-'+m).classList.toggle('active', m===mode));
  renderSaves();
}

/* ══════════════════════════════
   MODAL
══════════════════════════════ */
function openAddModal() {
  editingId = null; selectedFileData = null; selectedImageData = null;
  document.getElementById('modal-title').textContent = '➕ إضافة ملف حفظ جديد';
  document.getElementById('field-name').value = '';
  document.getElementById('modal-error').style.display = 'none';
  resetFileUpload(); resetImagePreview(); openModal();
}
function openEditModal(id) {
  const s = saves.find(x => x.id === id); if (!s) return;
  editingId = id; selectedFileData = null; selectedImageData = s.image || null;
  document.getElementById('modal-title').textContent = '✏️ تعديل ملف الحفظ';
  document.getElementById('field-name').value = s.name;
  document.getElementById('modal-error').style.display = 'none';
  resetFileUpload();
  if (s.image) {
    document.getElementById('img-preview').innerHTML =
      `<img src="${s.image}"><button class="img-remove" onclick="removeImage(event)">✕ حذف</button>`;
  } else resetImagePreview();
  openModal();
}
function openModal()  { document.getElementById('modal-overlay').classList.add('open'); setTimeout(()=>document.getElementById('field-name').focus(),100); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }

/* ══════════════════════════════
   FILE / IMAGE HANDLING
══════════════════════════════ */
function handleFileSelect(e) {
  const file = e.target.files[0]; if(!file) return;
  if(file.size > MAX_SIZE) { showModalError(`الملف (${formatSize(file.size)}) يتجاوز 50 MB`); e.target.value=''; return; }
  const r = new FileReader();
  r.onload = ev => {
    selectedFileData = { name:file.name, size:file.size, data:ev.target.result };
    updateFileUI(file);
    if(!document.getElementById('field-name').value.trim())
      document.getElementById('field-name').value = file.name.replace(/\.[^.]+$/,'');
  };
  r.readAsDataURL(file);
}
function updateFileUI(file) {
  document.getElementById('file-upload-area').classList.add('has-file');
  document.getElementById('selected-file-name').innerHTML =
    `<div class="file-name-badge">✅ ${file.name}</div>`;
  const pct = (file.size/MAX_SIZE)*100;
  document.getElementById('size-bar').style.display = 'block';
  document.getElementById('size-current').textContent = formatSize(file.size);
  const fill = document.getElementById('size-bar-fill');
  fill.style.width = pct+'%';
  fill.className = 'size-bar-fill'+(pct>80?' warn':'');
}
function resetFileUpload() {
  document.getElementById('save-file-input').value = '';
  document.getElementById('file-upload-area').classList.remove('has-file');
  document.getElementById('selected-file-name').innerHTML = '';
  document.getElementById('size-bar').style.display = 'none';
}
function handleImageUpload(e) {
  const file = e.target.files[0]; if(!file) return;
  if(file.size > 5*1024*1024) { showToast('error','❌ الصورة أكبر من 5 MB'); return; }
  const r = new FileReader();
  r.onload = ev => {
    selectedImageData = ev.target.result;
    document.getElementById('img-preview').innerHTML =
      `<img src="${selectedImageData}"><button class="img-remove" onclick="removeImage(event)">✕ حذف</button>`;
  };
  r.readAsDataURL(file);
}
function removeImage(e) { e.stopPropagation(); selectedImageData=null; resetImagePreview(); }
function resetImagePreview() {
  document.getElementById('img-preview').innerHTML = `
    <div class="img-placeholder"><div class="img-icon">🎮</div><div>اضغط لرفع صورة اللعبة</div></div>
    <button class="img-remove" onclick="removeImage(event)">✕ حذف</button>`;
}

/* ══════════════════════════════
   SAVE / DOWNLOAD / DELETE
══════════════════════════════ */
function saveEntry() {
  const name = document.getElementById('field-name').value.trim();
  if(!name) { showModalError('يرجى إدخال اسم للملف'); return; }
  if(editingId) {
    const s = saves.find(x=>x.id===editingId);
    s.name = name;
    if(selectedImageData !== null) s.image = selectedImageData;
    if(selectedFileData) { s.fileName=selectedFileData.name; s.fileSize=selectedFileData.size; s.fileData=selectedFileData.data; }
    s.updatedAt = Date.now();
  } else {
    if(!selectedFileData) { showModalError('يرجى اختيار ملف حفظ'); return; }
    saves.push({
      id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      name, fileName:selectedFileData.name, fileSize:selectedFileData.size,
      fileData:selectedFileData.data, image:selectedImageData,
      createdAt:Date.now(), updatedAt:Date.now()
    });
  }
  persistSaves(); closeModal(); renderSaves();
  showToast('success', editingId ? '✅ تم التحديث' : '✅ تم إضافة الملف');
}
function downloadSave(id) {
  const s = saves.find(x=>x.id===id);
  if(!s||!s.fileData) { showToast('error','❌ لا يوجد ملف'); return; }
  const a = document.createElement('a'); a.href=s.fileData; a.download=s.fileName; a.click();
  showToast('info',`⬇️ تحميل: ${s.name}`);
}
function deleteSave(id) {
  const s = saves.find(x=>x.id===id); if(!s) return;
  if(!confirm(`حذف "${s.name}"؟`)) return;
  saves = saves.filter(x=>x.id!==id); persistSaves(); renderSaves();
  showToast('success','🗑️ تم الحذف');
}

/* ══════════════════════════════
   HELPERS
══════════════════════════════ */
function formatSize(b) {
  if(!b) return '0 B';
  if(b<1024) return b+' B';
  if(b<1024*1024) return (b/1024).toFixed(1)+' KB';
  return (b/(1024*1024)).toFixed(2)+' MB';
}
function formatDate(ts) {
  if(!ts) return '';
  return new Date(ts).toLocaleDateString('ar-IQ',{year:'numeric',month:'short',day:'numeric'});
}
function getExt(fn) {
  if(!fn) return 'FILE';
  const e = fn.split('.').pop().toUpperCase();
  return e.length>6?'FILE':e;
}
function showModalError(msg) {
  const el=document.getElementById('modal-error'); el.textContent='⚠️ '+msg; el.style.display='block';
}
function showToast(type, msg) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div'); t.className=`toast ${type}`;
  t.innerHTML=`<span class="toast-dot">●</span> ${msg}`;
  c.appendChild(t); setTimeout(()=>t.remove(),3500);
}

/* ══════════════════════════════
   INIT — PIN NAVIGATION & DRAG DROP
══════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  const pins = [...document.querySelectorAll('.pin-digit')];
  pins.forEach((pin,idx) => {
    pin.addEventListener('input', e => {
      e.target.value = e.target.value.replace(/\D/g,'');
      if(e.target.value && idx < pins.length-1) pins[idx+1].focus();
    });
    pin.addEventListener('keydown', e => {
      if(e.key==='Backspace' && !pin.value && idx>0) pins[idx-1].focus();
      if(e.key==='Enter') handleLogin();
    });
  });
  document.getElementById('login-username').addEventListener('keydown', e => {
    if(e.key==='Enter') pins[0].focus();
  });

  const area = document.getElementById('file-upload-area');
  area.addEventListener('dragover', e => { e.preventDefault(); area.style.borderColor='var(--blue-bright)'; });
  area.addEventListener('dragleave', () => { area.style.borderColor=''; });
  area.addEventListener('drop', e => {
    e.preventDefault(); area.style.borderColor='';
    const file = e.dataTransfer.files[0]; if(!file) return;
    if(file.size>MAX_SIZE) { showToast('error','❌ الملف أكبر من 50 MB'); return; }
    const r = new FileReader();
    r.onload = ev => {
      selectedFileData = { name:file.name, size:file.size, data:ev.target.result };
      updateFileUI(file);
      if(!document.getElementById('field-name').value.trim())
        document.getElementById('field-name').value = file.name.replace(/\.[^.]+$/,'');
    };
    r.readAsDataURL(file);
  });
});
</script>
